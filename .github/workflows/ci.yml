name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run test:run
      - run: npm run test:coverage
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test]
    env:
      # Stub env vars for build (not real secrets)
      ANTHROPIC_API_KEY: "sk-ant-build-placeholder"
      DATABASE_URL: "postgresql://build:build@localhost:5432/build"
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_build"
      CLERK_SECRET_KEY: "sk_test_build"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - name: Report bundle size
        run: |
          echo "## Bundle Size" >> $GITHUB_STEP_SUMMARY
          du -sh .next/ | awk '{print "Total: " $1}' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Page sizes" >> $GITHUB_STEP_SUMMARY
          find .next/server -name "*.js" -type f | head -20 | while read f; do
            size=$(du -sh "$f" | awk '{print $1}')
            echo "- \`$(basename $f)\`: $size" >> $GITHUB_STEP_SUMMARY
          done
